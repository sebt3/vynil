---
name: Release CLI

on:
  push:
    tags:
    - '*'
jobs:
  # upload-rust-binary-action does NOT create the release — it only uploads assets to an
  # existing one. Create it first, once, then fan out the per-target uploads.
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v7
    - uses: taiki-e/create-gh-release-action@v1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

  upload:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        target:
        - x86_64-unknown-linux-gnu
        - aarch64-unknown-linux-gnu
    steps:
    - uses: actions/checkout@v7
    # Builds kubectl-vynil for the target (uses `cross` for non-native arches),
    # then uploads the archive to the release created above.
    - name: Build and upload kubectl-vynil
      uses: taiki-e/upload-rust-binary-action@v1
      with:
        bin: kubectl-vynil
        # Scope cargo to the CLI package: the workspace default-members are agent+operator,
        # so a bare `--bin kubectl-vynil` at the root resolves against the wrong package set.
        manifest-path: kubectl-vynil/Cargo.toml
        target: ${{ matrix.target }}
        archive: kubectl-vynil-$target
        tar: all
        token: ${{ secrets.GITHUB_TOKEN }}
