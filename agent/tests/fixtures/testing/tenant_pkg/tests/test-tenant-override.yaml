---
apiVersion: vinyl.solidite.fr/v1beta1
kind: Test
metadata:
  name: tenant-override-test
instance:
  name: my-app
  namespace: my-tenant-ns
  tenant: "explicit-tenant"
  options:
    common_name: "custom.example.com"
asserts:
  - name: explicit-tenant-name
    selector:
      kind: ConfigMap
      name: "{{tenant.name}}-config"
    matcher: any
  - name: values-override-resolves
    selector:
      kind: ConfigMap
      name: "cm-{{values.common_name}}"
    matcher: any
